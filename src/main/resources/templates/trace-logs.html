<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>행위추적로그 | 증명서 포털</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <a class="brand" th:href="@{/main}">증명서 포털</a>
    <div class="account">
        <span><strong th:text="${session.loginUserName}">admin</strong> 님 환영합니다.</span>
        <form th:action="@{/logout}" method="post"><button class="logout-button" type="submit">로그아웃</button></form>
    </div>
</header>
<main class="page">
    <h1>행위추적로그</h1>
    <p class="subtitle">날짜와 시간대를 선택하여 사용자 행위를 확인합니다.</p>

    <section class="board-card trace-filter-card">
        <form class="trace-filter" th:action="@{/trace-logs}" method="get">
            <input type="hidden" name="refresh" value="true">
            <div class="filter-field">
                <label for="date">날짜</label>
                <input id="date" name="date" type="date" th:value="${selectedDate}" required>
            </div>
            <div class="filter-field">
                <label for="userId">사용자 ID</label>
                <input id="userId" name="userId" type="text" th:value="${userId}"
                       placeholder="공백이면 전체" autocomplete="off">
            </div>
            <div class="filter-field">
                <label for="startHour">시작 시간</label>
                <select id="startHour" name="startHour">
                    <option th:each="hour : ${hours}"
                            th:value="${hour}"
                            th:text="${#numbers.formatInteger(hour, 2) + ':00'}"
                            th:selected="${hour == startHour}">00:00</option>
                </select>
            </div>
            <div class="filter-field">
                <label for="endHour">종료 시간</label>
                <select id="endHour" name="endHour">
                    <option th:each="hour : ${hours}"
                            th:value="${hour}"
                            th:text="${#numbers.formatInteger(hour, 2) + ':59'}"
                            th:selected="${hour == endHour}">23:59</option>
                </select>
            </div>
            <button class="primary-action refresh-button" type="submit">새로고침</button>
        </form>
        <p class="error trace-error" th:if="${error}" th:text="${error}"></p>
    </section>

    <section class="board-card trace-results">
        <div class="board-table-wrap">
            <table class="board-table">
                <thead>
                <tr>
                    <th class="trace-time-column">날짜와 시간</th>
                    <th class="trace-user-column">사용자 ID</th>
                    <th>접근 메뉴·행위</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${entries}">
                    <td th:text="${#temporals.format(entry.timestamp, 'yyyy-MM-dd HH:mm:ss')}">2026-07-02 12:00:00</td>
                    <td th:text="${entry.userId}">user</td>
                    <td class="trace-action" th:text="${entry.action}">MAIN</td>
                </tr>
                <tr th:if="${refreshed and #lists.isEmpty(entries)}">
                    <td class="empty-board" colspan="3">선택한 시간대에 기록된 로그가 없습니다.</td>
                </tr>
                <tr th:unless="${refreshed}">
                    <td class="empty-board" colspan="3">조회 조건을 선택하고 새로고침을 눌러 주세요.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
    <a class="back-link" th:href="@{/main}">← 메인으로 돌아가기</a>
</main>
</body>
</html>
